services:
  # ─────────────────────────────────────────
  # Backend — FastAPI WebSocket API
  # ─────────────────────────────────────────
  - type: web
    name: voice-agent-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OPENAI_API_KEY
        sync: false          # Set this in the Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: REDIS_HOST
        sync: false          # Set to Render Redis internal host if using Redis add-on
      - key: REDIS_PORT
        value: "6379"
      - key: DATABASE_URL
        value: sqlite:///./healthcare.db

  # ─────────────────────────────────────────
  # Frontend — Vite / React Static Site
  # ─────────────────────────────────────────
  - type: web
    name: voice-agent-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        sync: false          # Set to your backend service URL, e.g. voice-agent-backend.onrender.com
